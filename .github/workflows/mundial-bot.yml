name: Mundial Carrusel Bot

# Corre solo, sin tu PC: cada 3 horas (horario UTC) + un botón manual.
on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'   # cada 3 horas ✓: 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC
  workflow_dispatch:             # botón "Run workflow" para pruebas manuales

permissions:
  contents: write   # necesario para que el bot pueda subir los PNG/JSON al repo

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias (incluye Chrome para Puppeteer)
        run: npm install

      - name: Generar carruseles (investigación + render)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: node run.js

      - name: Guardar resultados en el repo
        run: |
          git config user.name "mundial-bot"
          git config user.email "mundial-bot@users.noreply.github.com"
          git add salida/ cache/
          git diff --staged --quiet || git commit -m "Carruseles generados $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Enviar borradores nuevos a Buffer
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: node publish.js

      - name: Guardar marcadores de Buffer en el repo
        run: |
          git add salida/
          git diff --staged --quiet || git commit -m "Marcar carruseles enviados a Buffer"
          git push
